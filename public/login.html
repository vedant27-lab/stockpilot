<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPilot | Login</title>
  <meta name="description" content="Login to StockPilot inventory management system. Admin and customer access with role-based dashboards.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card animate-in" id="login-card">
      <div class="login-card__logo">StockPilot</div>
      <p class="login-card__subtitle" id="card-subtitle">Sign in to your workspace</p>

      <div class="login-error" id="login-error"></div>

      <form id="auth-form">
        <div class="form-group" id="name-group" style="display:none; margin-bottom: 1rem;">
          <label for="auth-name">Full Name</label>
          <input type="text" id="auth-name" placeholder="Vedant Sharma">
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required>
        </div>

        <button class="btn btn--primary btn--block" type="submit" id="auth-submit">
          Sign In
        </button>
      </form>

      <div class="login-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-link" onclick="toggleMode()">Create one</a>
      </div>

      <div style="margin-top:1.5rem; text-align:center;">
        <button class="theme-toggle" id="theme-toggle" type="button">Toggle Theme</button>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
